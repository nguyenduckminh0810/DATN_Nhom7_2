
spring.application.name=AURO

# ===============================
# = DATABASE CONFIG (SQL Server)
# ===============================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=AURO;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# # ===============================
# # = JWT CONFIG
# # ===============================
# secret key d\u00c3\u00b9ng \u00c4\u0091\u00e1\u00bb\u0083 k\u00c3\u00bd JWT (n\u00c3\u00aan \u00c4\u0091\u00e1\u00bb\u0083 \u00e1\u00bb\u009f ENV/Secret Vault)
app.jwt.secret=YXVyby1zdXBlci1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tZ2VuZXJhdGlvbi0yMDI1LXZlcnktbG9uZy1hbmQtc2VjdXJl
# th\u00e1\u00bb\u009di gian s\u00e1\u00bb\u0091ng c\u00e1\u00bb\u00a7a token (15 ph\u00c3\u00bat)
app.jwt.expiration=900000
# refresh token (7 ng\u00c3\u00a0y)
app.jwt.refresh-expiration=604800000

